name: Wanderlust CI Pipeline

on:
  push:
    branches:
      - main
permissions:
  contents: write    

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t xerox2/wanderlust-backend:${{ github.run_number }} ./backend
          docker tag xerox2/wanderlust-backend:${{ github.run_number }} xerox2/wanderlust-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t xerox2/wanderlust-frontend:${{ github.run_number }} ./frontend
          docker tag xerox2/wanderlust-frontend:${{ github.run_number }} xerox2/wanderlust-frontend:latest

      - name: Push Backend Image
        run: |
          docker push xerox2/wanderlust-backend:${{ github.run_number }}
          docker push xerox2/wanderlust-backend:latest

      - name: Push Frontend Image
        run: |
          docker push xerox2/wanderlust-frontend:${{ github.run_number }}
          docker push xerox2/wanderlust-frontend:latest
      - name: Clone Infrastructure Repository
        run: |
         git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/pushpendra-singh1176/wanderlust-infrastructure.git
      - name: Configure Git
        run: |
         git config --global user.name "github-actions"
         git config --global user.email "github-actions@github.com"
      - name: Update Backend Image
        run: |
         sed -i "s|image: xerox2/wanderlust-backend:.*|image: xerox2/wanderlust-backend:${{ github.run_number }}|" wanderlust-infrastructure/kubernetes/backend/deployment.yaml
      - name: Verify Backend Deployment
        run: |
         cat wanderlust-infrastructure/kubernetes/backend/deployment.yaml 
      - name: Update Frontend Image
        run: |
         sed -i "s|image: xerox2/wanderlust-frontend:.*|image: xerox2/wanderlust-frontend:${{ github.run_number }}|" wanderlust-infrastructure/kubernetes/frontend/deployment.yaml
      - name: Verify frontend Deployment
        run: |
         cat wanderlust-infrastructure/kubernetes/frontend/deployment.yaml
      - name: Commit Changes
        run: |
         cd wanderlust-infrastructure
         git add .
         git commit -m "Update image tags to ${{ github.run_number }} [skip ci]" || echo "No changes to commit"
      - name: Push Changes
        run: |
         cd wanderlust-infrastructure
         git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/pushpendra-singh1176/wanderlust-infrastructure.git
         git push origin main
